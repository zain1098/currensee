  carousel_slider: ^4.2.1
  http: ^1.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  firebase_core: ^3.14.0
  cloud_firestore: ^5.6.9
  syncfusion_flutter_charts: ^29.2.10
  syncfusion_flutter_sliders: ^29.2.10
  flutter_svg: ^2.2.0
  flutter_colorpicker: ^1.1.0
  shared_preferences: ^2.5.3
  math_expressions: ^3.0.0
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.3
  uuid: ^4.5.1
  provider: ^6.1.5
  flutter_spinkit: ^5.2.1
  lottie: ^3.3.1
  firebase_auth: ^5.6.0
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.2
  country_code_picker: ^3.3.0
  permission_handler: ^12.0.0+1
  connectivity_plus: ^6.1.4
  flutter_local_notifications: ^18.0.0+1
  fluttertoast: ^8.2.12
  font_awesome_flutter: ^10.8.0
  emailjs: ^1.0.0
  image_picker: ^1.1.2
  firebase_storage: ^12.4.9
  path_provider: ^2.1.1
  path: ^1.8.3
  feature_discovery: ^0.14.1
  flutter_dotenv: ^5.1.0
  local_auth: ^2.3.0
  share_plus: ^11.0.0
  audioplayers: ^6.5.0
  home_widget: ^0.8.0
  dropdown_search: ^5.0.2
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
